<!DOCTYPE html>
<head>
    <title>Flex</title>
</head>

<style>

    .flex-container1{
        display: flex;
        flex-direction: row;
        margin-bottom: 10px;
    }

    .width1{width: 200px;}
    .width2{width: 75px}

    .flex-container2{
        display: flex;
        flex-direction: row;
        margin-bottom: 10px;

    }

    .item1{width: 50px}
    .item2{width: 1550px;}
    .item3{width: 75px}

    .flex-container3{
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        margin-bottom: 10px; 
    }

    .flex-container4{
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        border: 1px solid gray;
        height: 50px;
        margin-bottom: 10px;
    }

    .header,footer{
        background-color: #E6E6FA;
        height: 100px;
    }

    .nav{
        display:flex;
        flex-direction: row;
        background-color: #CCCCFF;
        list-style: none;
        height: 200px;
        padding-top: 10px;
        padding-bottom: 10px;
    }
    
    .li1{
        width:550px;
        margin-right:10px;
    }
    .li2{width: 1450px;}
    
</style>

<body>
    <h2>PART 1</h2>
    <div class="flex-container1">
        <div class="width1" style="background-color: lightblue;">200px</div>
        <div class="width2" style="background-color: pink;">75px</div>
     </div>

    <div class="flex-container2">
        <div class="item1" style="background-color: lightblue;">item1</div>
        <div class="item2" style="background-color: pink;">item2</div>
        <div class="item3" style="background-color: lightblue;">item3</div>
    </div>

    <div class="flex-container3">
        <div class="f3-item1" style="background-color: pink;">item1</div>
        <div class="f3-item2" style="background-color: pink;">item2</div>
        <div class="f3-item3" style="background-color: pink;">item3</div>
        <div class="f3-item4" style="background-color: pink;">item4</div>
    </div>

    <div class="flex-container4">
        <div class="f4-item1" style="background-color: pink;">item1</div>
        <div class="f4-item2" style="background-color: pink;">item2</div>
    </div>
   <h2>PART 2</h2>
    <div class="header">This is header</div>

    <div class="nav">
        <li class="li1" style="background-color: #5A4FCF;">Section left-nav</li>
        <li class="li2" style="background-color: #5A4FCF;" >Section left-nav</li>
    </div>

    <div class="header">This is header</div>

    


    
</body>

</html>
