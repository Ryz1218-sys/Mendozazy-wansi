<style>
  fieldset{
    background-color: #5D8AA8;

<body>

<fieldset>

  </tr>

  </tr>

  </tr>
 
  <tr>

  </tr>
      
  <tr>

  <tr> 
    <td></td>

  </tr> 
        
  <tr>  
     <td></td>

  </tr>  
      
  <tr>
    <td></td>
    <td><input type="radio" id="Less than 10" value "" name="size"><label>Over 200</label></td>
  </tr>

  <tr>
    <td>Services:</td>
    <td><input type="checkbox"><label>Brand Identity</label>
        <input type="checkbox"><label>New Website</label>
        <input type="checkbox"><label>Web Redesign</label></td>
  </tr>
      
  <tr>
      <td>Timeline:</td>
      <td><select>
          <option></option>
          <option> Immidiately</option>
          <option>1-2 weeks</option>
          <option>3-6 weeks</option>
          <option>7-2 months</option>
         </select></td>
  </tr>

   <tr>
       <td></td>

  </tr>
</table>
</fieldset>
