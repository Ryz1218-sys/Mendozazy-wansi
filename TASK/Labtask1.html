<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Positions Task</title>

<style>
body{
    height:3000px;
}

.box{ 
    position:fixed;
    width: 320px;
    height: 180px;
    bottom:10px;
    right:10px;
    background:grey;
    z-index: 1;
}

.closebutton{
    position:absolute;
    top:10px;
    right:10px;
    width:25px;
    height:25px;
    background:black;
    color:white;
    border-radius:20px;
    cursor:pointer;
}

.product{
    position:relative; 
    display:inline-block;
    margin:100px;
    padding: 10px;
    margin-left:40%;
}

.product img{
    width:95%;
    height:450px;
    background-color: white;
    padding: 10px;
    padding-right: 30px;
    border:1px solid black;
    border-radius: 20px;
}

.discount{
    position:absolute;
    top:30px;
    right:6px;
    background:black;
    color:white;
    padding:10px 25px;
}

.overlay{
    position:absolute;
    bottom: 20px;
    right:-20px ;
    width:100%;
    height:33%;
    background:rgb(255,255,255,.5); 
}

.cart{
    position:absolute;
    bottom:20px;
    right: 55px;
    background:white;
    padding:10px;
    border:1px solid black;
    border-radius: 5px;
    cursor:pointer;
}

</style>
</head>

<body>
    <button class="closebutton">X</button>
   
    <div class="product">
        <img src="shirt.jpg">
        <div class="discount">20% OFF</div>
        <div class="overlay">
            <div class="cart">Add to Cart</div>
        </div>
    </div>
    
    <br>
    <br>
    <br>

    <img src="FICODE1.png" height="1600px">
</body>
</html>
